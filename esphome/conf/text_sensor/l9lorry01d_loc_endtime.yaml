# text_sensor:
  - platform: template
    name: ${loc_endtime_name}
    id: ${loc_endtime_id}
    lambda: |-
      if (id(esphome_time).now().is_valid()) {
        return (id(esphome_time).now().strftime("%H:%M:%S"));
      } else {
        return ( "NoTime" );
      }
    update_interval: 10s

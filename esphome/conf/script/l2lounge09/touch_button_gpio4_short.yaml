#script:
  # on_multi_click action of TB GPIO4 (short click)
  - id: tb_gpio4_click_short
    mode: single
    then:
      # - logger.log: "script tb_gpio4_click_short action."
      - if:
          condition:
            # execute this script only if we are offline
            # lambda: 'return (!id(isDeviceConnected);'
            
            # execute this script anyway (TM) for debugging purposes
            lambda: 'return (true);'
          then:
            # - logger.log: "script tb_gpio4_click_short action."
            - output.turn_on: ${esp32c3_onboard_led_id}

            - espnow.send:
                address: !secret ESPNOW_MAC_L2BTPROXYKITCHEN
                data: [0x01]  # Turns on the LED on the slave

            - logger.log: "Sent data Power On"

            - delay: 1s
            - output.turn_off: ${esp32c3_onboard_led_id}

            # - homeassistant.action:

            #     data:
            #       switch_id: 'switch.zb_plug_l2_lounge_light_corner'
            # - homeassistant.action:
            #     action: script.switch_turn_off_by_esphome
            #     data: 
            #       switch_id: 'switch.zb_plug_l2_lounge_tv'


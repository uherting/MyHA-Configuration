####################################################################
# DEVICE SPECIFIC SUBSTITUTIONS

# device definitions
device_name: l9lorry01g
device_comment: Level 2 Kitchen 12 ESP32-2432S028R aka CYD
device_area: L2

device_platform: ESP32
wifi_static_ip: 192.168.178.38

# The ESP32-2432S028R uses a standard ESP32-WROVER, 
# so we use the esp32dev defintion here with the Arduino framework
device_board: esp32dev
device_framework: arduino

# the friendly name and id
friendly_name: ""
friendly_id: ""

# display
display_id: ${device_name}_display

# the update interval for the GPS sensor
gps_update_interval: 20s
####################################################################
# EOF
####################################################################

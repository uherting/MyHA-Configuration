####################################################################
# SENSORS

####################################################################
# Temperature and humidity sensor AHT20
#sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: ${aht20_01_temp_name}
      id: ${aht20_01_temp_id}
      unit_of_measurement: ${aht20_01_temp_unit}
      on_value:
        then:
          - lambda: |-
              id(lbl_page_location_temp_01).set_text(to_string(x) + " ${aht20_01_temp_unit}");
          - lambda: |-
            ESP_LOGD("main", "Temperature: %f %s", x, "${aht20_01_temp_unit}");
    humidity:
      name: ${aht20_01_hum_name}
      id: ${aht20_01_hum_id}
      unit_of_measurement: ${aht20_01_hum_unit}
      on_value:
        then:
          - lambda: |-
              id(lbl_page_location_hum_01).set_text(to_string(x) + " ${aht20_01_hum_unit}");
          - lambda: |-
            ESP_LOGD("main", "Humidity: %f %s", x, "${aht20_01_hum_unit}");
    address: ${aht20_01_address}
    update_interval: ${aht20_01_update_interval}
####################################################################
# EOF
####################################################################

####################################################################
# DISPLAY INTERVAL

# show the next page every x seconds, and update the display
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_page_location_time
          text:
            format: "%02d:%02d:%02d\n  %02d:%02d."
            args: [ 'id()' ]
# ############################################################
#  END OF FILE
# ############################################################

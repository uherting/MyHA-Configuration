####################################################################
# DISPLAY INTERVAL

# show the next page every x seconds, and update the display
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_page_location_time
          text:
            format: "%s"
            args: [ 'id(location_time_now).state']

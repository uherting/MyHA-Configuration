####################################################################
# LVGL config for ESP32-2432S028R aka CYD --- with onboard ESP32
#####################################################################

# lvgl:

################################################################
# initially taken from 
# - https://github.com/pixelEDI/LVGL_ESP32_YT-Beispiele/blob/main/10_LVGL_HelloWorld_switch_mit_ESPHome/lvgl_helloworld.yaml
#
# added stuff later on from other sources
# - https://github.com/agillis/esphome-modular-lvgl-buttons/blob/main/buttons/switch_button.yaml
################################################################
  buffer_size: 25%
  theme:
    label:
      text_color: default_label_txt_color
    button:
      # This base is overridden by each button's bg_color
      bg_color: default_btn_bg_color
      # bg_opa: COVER
      bg_opa: transp
      border_color: default_btn_border_color
      border_width: 1
      text_color: default_btn_txt_color
      pressed:
        bg_color: 0x000000
        bg_grad_color: 0xC0C0C0
        bg_opa: COVER
        text_color: default_btn_txt_pressed_color
      checked:
        bg_color: 0x000000
        bg_grad_color: 0x000000
        bg_opa: COVER
        text_color: default_btn_txt_checked_color
  top_layer:
    widgets:
      # make sure it's the last one in this list:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: boot_logo
                y: -50
            - spinner:
                align: CENTER
                y: 50
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen
  pages:
    # =========================================================================
    # location page with a grid layout plus buttons at the bottom for page navigation, wifi and gps status
    - id: page_location
      pad_all: 0
      widgets:
        - obj:
            width: ${cyd_display_width_320}
            height: ${cyd_display_height_240}
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            # the main content of the page
            widgets:
              # ------------- line 1 / 3 ------------- 
              - button:
                  id: btn_day_begin
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_begin
                        text: "󰖜"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - delay: 100ms
              - button:
                  id: btn_point_of_interest
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  grid_cell_column_span: 2
                  # checkable: true
                  checkable: false
                  widgets:
                    - label:
                        id: lbl_btn_point_of_interest
                        text: "󰓎"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - delay: 100ms
              - button:
                  id: btn_day_end
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_end
                        text: "󰖜"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - delay: 100ms
              # ------------- line 2 / 3 ------------- 
              - label:
                  id: lbl_page_location_time_start
                  text: "Time\nStart"
                  text_font: my_font16
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 1
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              - label:
                  id: lbl_page_location_centre_left_01
                  text: "Temp"
                  text_font: my_font16
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 1
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # - label:
              #     id: lbl_page_location_centre_right_01
              #     text: "Hum"
              #     text_font: my_font16
              #     grid_cell_column_pos: 2
              #     grid_cell_row_pos: 1
              #     grid_cell_column_span: 1
              #     grid_cell_x_align: CENTER
              #     grid_cell_y_align: CENTER
              - label:
                  id: lbl_page_location_time_end
                  text: "Time\nEnd"
                  text_font: my_font16
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 1
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # ------------- line 3 / 3 ------------- 
              # the buttons at the bottom of the screen
              - button:
                  id: btn_previous_page_0
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_previous_page_0
                        text: "󰧀"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - lvgl.page.previous:
              - button:
                  id: btn_wifi_0
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_wifi_0
                        text: "󰖩"
                        text_font: mdi_icons
                        align: center
              - button:
                  id: btn_gps_0
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_gps_0
                        text: "󰤉"
                        text_font: mdi_icons
                        align: center
              - button:
                  id: btn_next_page_0
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_next_page_0
                        text: "󰧂"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - lvgl.page.next:
    # =========================================================================
    # status page with a grid layout plus buttons at the bottom for page navigation, wifi and gps status
    - id: page_status
      pad_all: 0
      widgets:
        - obj:
            width: ${cyd_display_width_320}
            height: ${cyd_display_height_240}
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            # ========================================================================
            # the main content of the page
            widgets:
              # ------------- line 1 / 3 ------------- 
              # you can replace this with your own widgets, e.g. a dashboard with sensor values, or whatever you like
              - label:
                  id: lbl_page_location_10
                  text: "Status Page"
                  text_font: my_font16
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_column_span: 4
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # ------------- line 2 / 3 ------------- 
              - label:
                  id: lbl_page_location_101
                  text: "Time 10"
                  text_font: my_font16
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 2
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              - label:
                  id: lbl_page_location_111
                  text: "Time 11"
                  text_font: my_font16
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 2
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # ------------- line 3 / 3 ------------- 
              # the buttons at the bottom of the screen
              - button:
                  id: btn_previous_page_1
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_previous_page_1
                        text: "󰧀"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - lvgl.page.previous:
              - button:
                  id: btn_wifi_1
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_wifi_1
                        text: "󰖩"
                        text_font: mdi_icons
                        align: center
              - button:
                  id: btn_gps_1
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_gps
                        text: "󰤉"
                        text_font: mdi_icons
                        align: center
              - button:
                  id: btn_next_page_1
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_next_page_1
                        text: "󰧂"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      - lvgl.page.next:

####################################################################
# LVGL config for ESP32-2432S028R aka CYD --- with onboard ESP32
#####################################################################

# lvgl:

################################################################
# initially taken from 
# - https://github.com/pixelEDI/LVGL_ESP32_YT-Beispiele/blob/main/10_LVGL_HelloWorld_switch_mit_ESPHome/lvgl_helloworld.yaml
#
# added stuff later on from other sources
# - https://github.com/agillis/esphome-modular-lvgl-buttons/blob/main/buttons/switch_button.yaml
################################################################
  # rotation: valid values: 0, 90, 180 or 270. 180 equals to antenna on the left side
  # pay attention to the touchscreen, swap_xy: might be changed accordingly
  # after changing the rotation to 180, ...
  #   - having rotation: in display: does not get valitaded, so we put it into lvgl: config  
  #   - swap_xy: true is needed for the touchscreen to work correctly in landscape mode
  rotation: ${cyd_display_rotation} 

  buffer_size: 25%

  on_idle:
    timeout: !lambda "return (id(cyd_display_timeout_s).state * 1000);"
    then:
      - lvgl.pause:
      - light.turn_off: display_backlight
      - switch.turn_on: switch_antiburn
  theme:
    label:
      text_color: default_label_txt_color
    button:
      # This base is overridden by each button's bg_color
      bg_color: default_btn_bg_color
      # bg_opa: COVER
      bg_opa: transp
      border_color: default_btn_border_color
      border_width: 1
      text_color: default_btn_txt_color
      pressed:
        bg_color: 0x000000
        bg_grad_color: 0xC0C0C0
        bg_opa: COVER
        text_color: default_btn_txt_pressed_color
      checked:
        bg_color: 0x000000
        bg_grad_color: 0x000000
        bg_opa: COVER
        text_color: default_btn_txt_checked_color
  style_definitions:
    - id: header_footer
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 30
  top_layer:
    widgets:
      - label:
          text: "T"
          id: lbl_time_status
          hidden: true
          align: bottom_right
          x: -37
          y: -35
          text_align: right
          text_color: 0xFFFFFF
      - label:
          text: "\uF1EB"
          id: lbl_wifi_status
          hidden: true
          align: bottom_right
          x: -7
          y: -35
          text_align: right
          text_color: 0xFFFFFF
      - buttonmatrix:
          align: bottom_mid
          styles: header_footer
          pad_all: 0
          outline_width: 0
          id: top_layer
          items:
            styles: header_footer
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053"
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: "\uF015"
                on_press:
                  then:
                    lvgl.page.show: page_location
              - id: page_next
                text: "\uF054"
                on_press:
                  then:
                    lvgl.page.next:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: boot_logo
                y: -70
            - spinner:
                align: CENTER
                y: 30
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
            - label:
                text: "IP Address: not connected"
                id: lbl_ip_address
                align: CENTER
                y: 85
                text_font: montserrat_18
                text_align: right
                text_color: 0x000000
            - label:
                text: "Please wait, booting up..."
                id: lbl_wait_booting_up 
                align: CENTER
                y: 105
                text_font: montserrat_18
                text_align: right
                text_color: 0x000000
          # boot screen is hidden only if wifi and time are available
          # on_press:
          #   - lvgl.widget.hide: boot_screen
  pages:
    # =========================================================================
    # location page with a grid layout plus buttons at the bottom for page navigation, wifi and gps status
    - id: page_location
      pad_all: 0
      widgets:
        - obj:
            width: ${cyd_display_width_320}
            height: ${cyd_display_height_240}
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            # the main content of the page
            widgets:
              # ------------- line 1 / 3 ------------- 
              - button:
                  id: btn_day_start
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_start
                        text: "󰖜"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "day start button clicked");
                      - delay: 500ms
              - button:
                  id: btn_poi
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  grid_cell_column_span: 2
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_poi
                        text: "󰓎"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "poi button clicked");
                      - delay: 500ms
              - button:
                  id: btn_day_end
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_end
                        text: "󰖛"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "day end button clicked");
                      - delay: 500ms
              # ------------- line 2 / 3 ------------- 
              - label:
                  id: lbl_page_location_time_start
                  text: "Time\nStart"
                  text_font: my_font16
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 1
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              - label:
                  id: lbl_page_location_poi
                  text: "Time\nPOI"
                  text_font: my_font16
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 2
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # - label:
              #     id: lbl_page_location_centre_left_01
              #     text: "Info"
              #     text_font: my_font16
              #     grid_cell_column_pos: 1
              #     grid_cell_row_pos: 2
              #     grid_cell_column_span: 1
              #     grid_cell_x_align: CENTER
              #     grid_cell_y_align: CENTER
              - label:
                  id: lbl_page_location_time_end
                  text: "Time\nEnd"
                  text_font: my_font16
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 1
                  grid_cell_column_span: 1
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # ------------- line 3 / 3 ------------- 
              - label:
                  id: lbl_page_location_time
                  text: "Current\nTime"
                  text_font: my_font16
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  grid_cell_column_span: 1
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              # - label:
              #     id: lbl_page_location_data_th
              #     text: "Current\nData"
              #     text_font: my_font16
              #     grid_cell_column_pos: 1
              #     grid_cell_row_pos: 2
              #     grid_cell_column_span: 1
              #     grid_cell_x_align: CENTER
              #     grid_cell_y_align: CENTER
    # =========================================================================
    # status page with a grid layout plus buttons at the bottom for page navigation, wifi and gps status
    - id: page_status
      pad_all: 0
      widgets:
        - obj:
            width: ${cyd_display_width_320}
            height: ${cyd_display_height_240}
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            # ========================================================================
            # the main content of the page
            widgets:
              # ------------- line 1 / 3 ------------- 
              - button:
                  id: btn_day_activity_drive
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_activity_drive
                        text: "󰪥"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "activity drive button clicked");
                      - delay: 500ms
              - button:
                  id: btn_day_activity_work
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_activity_work
                        text: "󰢷"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "activity work button clicked");
                      - delay: 500ms
              - button:
                  id: btn_day_activity_rest
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_activity_rest
                        text: "󰋣"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "activity rest button clicked");
                      - delay: 500ms
              - button:
                  id: btn_day_activity_misc
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_activity_misc
                        text: "󱥫"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "activity misc button clicked");
                      - delay: 500ms
              # ------------- line 2 / 3 ------------- 
              # here comes the numbers related to the buttons above, e.g. 
              # the time and date of the day start, poi and day end

              # - label:
              #     id: lbl_page_location_101
              #     text: "Time 10"
              #     text_font: my_font16
              #     grid_cell_column_pos: 0
              #     grid_cell_row_pos: 1
              #     grid_cell_column_span: 2
              #     grid_cell_x_align: CENTER
              #     grid_cell_y_align: CENTER
              # - label:
              #     id: lbl_page_location_111
              #     text: "Time 11"
              #     text_font: my_font16
              #     grid_cell_column_pos: 2
              #     grid_cell_row_pos: 1
              #     grid_cell_column_span: 2
              #     grid_cell_x_align: CENTER
              #     grid_cell_y_align: CENTER
              # ------------- line 3 / 3 ------------- 
              # start / end of day activity
              - button:
                  id: btn_day_activity_start
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_activity_start
                        text: "󰅕"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "day activity start button clicked");
                      - delay: 500ms
              # more labels probably need to be added here, e.g. for the total time 
              # of the day activity, the total distance of the day activity, etc.
              - button:
                  id: btn_day_activity_end
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 2
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH
                  checkable: true
                  widgets:
                    - label:
                        id: lbl_btn_day_activity_end
                        text: "󰅑"
                        text_font: mdi_icons
                        align: center
                  on_click:
                    then:
                      # - lambda: |-
                      #     ESP_LOGD("binary_sensor", "day activity end button clicked");
                      - delay: 500ms
    - id: keypad_page
      widgets:
        - led:
            id: lvgl_led
            x: 30
            y: 47
            color: 0xFF0000
            brightness: 70%
        - obj:
            width: 140
            height: 25
            align_to:
              id: lvgl_led
              align: OUT_RIGHT_MID
              x: 17
            border_width: 1
            border_color: 0
            border_opa: 50%
            pad_all: 0
            bg_opa: 80%
            bg_color: 0xFFFFFF
            shadow_color: 0
            shadow_opa: 50%
            shadow_width: 10
            shadow_spread: 3
            radius: 5
            widgets:
              - label:
                  id: lvgl_label
                  align: CENTER
                  text: "Enter code and \uF00C"
                  text_align: CENTER
        - buttonmatrix:
            id: lvgl_keypad
            x: 20
            y: 85
            width: 200
            height: 190
            items:
              pressed:
                bg_color: 0xFFFF00
            rows:
              - buttons:
                  - text: 1
                    control:
                      no_repeat: true
                  - text: 2
                    control:
                      no_repeat: true
                  - text: 3
                    control:
                      no_repeat: true
              - buttons:
                  - text: 4
                    control:
                      no_repeat: true
                  - text: 5
                    control:
                      no_repeat: true
                  - text: 6
                    control:
                      no_repeat: true
              - buttons:
                  - text: 7
                    control:
                      no_repeat: true
                  - text: 8
                    control:
                      no_repeat: true
                  - text: 9
                    control:
                      no_repeat: true
              - buttons:
                  - text: "\uF55A"
                    key_code: "*"
                    control:
                      no_repeat: true
                  - text: 0
                    control:
                      no_repeat: true
                  - text: "\uF00C"
                    key_code: "#"
                    control:
                      no_repeat: true
    - id: page_dummy
      pad_all: 0
      widgets:
        - obj:
            width: ${cyd_display_width_320}
            height: ${cyd_display_height_240}
            bg_color: room_bg_color
            layout:
              type: grid
              grid_columns: [fr(1), fr(1), fr(1), fr(1)]
              grid_rows: [fr(1), fr(1), fr(1), fr(1)]
            pad_all: 5px
            outline_pad: 5px
            # the main content of the page
            widgets:
              # some dummy widget which is hopefully working
              - switch:
                  id: switch_antiburn_btn
                  grid_cell_column_pos: 3
                  grid_cell_row_pos: 2
                  # grid_cell_x_align: STRETCH
                  # grid_cell_y_align: STRETCH
                  widgets:
                    - label:
                        id: lbl_switch_antiburn
                        text: "Antiburn"
                        text_font: my_font16
                        align: center
                  on_click:
                    then:
                      - switch.toggle: switch_antiburn


              # ========================================================================
              # just some example buttons in the grid, you can replace them with your own widgets
              # - switch:
              #     id: switch_antiburn_btn
              #     grid_cell_column_pos: 3
              #     grid_cell_row_pos: 2
              #     # grid_cell_x_align: STRETCH
              #     # grid_cell_y_align: STRETCH
              #     widgets:
              #       - label:
              #           id: lbl_switch_antiburn
              #           text: "Antiburn"
              #           text_font: my_font16
              #           align: center
              #     on_click:
              #       then:
              #         - switch.toggle: switch_antiburn
    # =========================================================================
    # end of pages, you can add more pages here if you like
    # =========================================================================

####################################################################

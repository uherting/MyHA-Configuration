#
# DEVICE: l9lorry01g
#
####################################################################
####################################################################

####################################################################
# DESCRIPTION
####################################################################
#
# Purpose:
#   - Data aquisition for the lorry01d device
#
# Future feature:
#   - reporting GPS data to a MySQL database on the internet via WiFi
#
# Hardware:
#   - 1 ESP32
#   - a module for T / H / P measurement (AHT20 and BMP280)
#     - AHT20 (temperature and humidity sensor)
#     - BMP280 (temperature and pressure sensor)
#   - GPS module
#
# Automation:
#   - still to be determined / documented
#
# WiFi:
#   - connects to the strongest WiFi configured
#
# Input:
#   - GPS module
#   - T / H / P sensor (AHT20 and BMP280)
#
# Output
#   - the device reports to lorry01d via ESPNow
#

###################### PACKAGES CONFIGURATION ######################
# naming conventions which override common behaviour

substitutions: 
  <<: !include conf/substitutions/device_specific/l9lorry01g.yaml
  <<: !include conf/substitutions/overwrites/l9lorry01g.yaml

###################### PACKAGES CONFIGURATION ######################
# merge information to setup the base
# log_level can be overwritten in overwrites/<device_name>.yaml

packages:
  substitutions_common: !include conf/common/packages/substitutions/common.yaml
  device_base_common: !include conf/common/packages/device_base_esp32.yaml
  wifi_common: !include conf/common/networking/wifi_multiple_networks_dhcp_ip_esp32_mobile.yaml

# ota: contained an error which got validated nevertheless. 
# After removal of the error (2x ota: entries) it threw an error, so ota: moved to root level
ota: !include conf/common/networking/ota.yaml

# in case of no connection to the Wifi
# for details see https://esphome.io/components/captive_portal.html
# captive_portal: conf/common/networking/captive_portal.yaml
# captive_portal:

############### BASIC CONFIGURATION FOR THIS DEVICE ###############

api: !include conf/common/networking/api.yaml
time: !include conf/common/time_ntp.yaml
# as this device is mobile, it does not make sense to include a fixed location.
# However, we might want to use the sun component anyhow, e.g. to have 
# a visual representation of sunrise and sunset times on the display.
sun: !include conf/common/sun.yaml

############### THE WEB SERVER LOCATED ON THIS DEVICE ###############
web_server:
  port: 8888

############### COMMON CONFIGURATION FOR THIS DEVICE ###############

# IC2 for the ESP32 platform
i2c: !include conf/common/device/i2c_esp32_v1.yaml

####################################################################
###################### DETAILED CONFIGURATION ######################
####################################################################

#-------------------------------------------------------------------
# MISC STUFF NEEDED FOR EXECUTION OF OFFLINE FUNCTIONALITY

globals:
  - <<: !include conf/common/globals/connectivity.yaml
interval: 
  - <<: !include conf/common/interval/connectivity.yaml
# script:
#   - <<: !include conf/common/script/pir1_to_ssr1_online.yaml

#-------------------------------------------------------------------
# BINARY SENSORS
binary_sensor:
  - <<: !include conf/common/binary_sensor/wifi_status.yaml

#-------------------------------------------------------------------
# SENSORS
sensor:
  # common sensors
  - <<: !include conf/common/sensor/wifisignal.yaml
  - <<: !include conf/common/sensor/uptime.yaml
  # device related
  # non so far...

#-------------------------------------------------------------------
# SWITCHES
# switch:
  # none so far
  # - <<: !include conf/common/switch/dummy_file_name.yaml

#-------------------------------------------------------------------
# TEXT SENSORS
text_sensor:
  # common text sensors
  - <<: !include conf/common/text_sensor/esphomeversion.yaml
  - <<: !include conf/common/text_sensor/wifiinfo.yaml
  - <<: !include conf/common/text_sensor/uptime.yaml
  # device related
  # none so far

#-------------------------------------------------------------------
# GPS related setup
# GPS module: EstarDyn GY-NEO6MV2 New NEO-6M GPS Module NEO6MV2 with Flight Control EEPROM MWC APM2.5 large Antenna)
# UART configuration for GPS module
uart: !include conf/common/device/uart01_esp32_gps.yaml
gps:
  id: ${friendly_id}_gps
  uart_id: ${uart01_esp32_gps_id}
  latitude:
    name: "GPS Latitude"
    id: gps_latitude
  longitude:
    name: "GPS Longitude"
    id: gps_longitude
  altitude:
    name: "GPS Altitude"
    id: gps_altitude
  speed:
    name: "GPS Speed"
    id: gps_speed
  course:
    name: "GPS Course"
    id: gps_course
  satellites:
    name: "GPS Visible Satellites"
    id: gps_satellites
  hdop:
    name: "GPS HDOP"
    id: gps_hdop
  update_interval: ${gps_update_interval}


#===================================================================
# Configuration for the 2.8" ESP32-2432S028R aka CYD, a touchscreen display (240x320 RGB)
#
# config based on:
# - if not otherwise stated, the information was taken from
#   https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/Examples/ESPHome/1-Helloworld/yellowtft1.yaml
# - other resources:
#   - I2C: https://github.com/RyanEwen/esphome-lvgl/blob/main/devices/ESP32-2432S028R.yaml
#===================================================================
#-------------------------------------------------------------------
# I2C from docs located at 
i2c: !include conf/common/device/i2c_esp32-2432s028r_v0.yaml
#-------------------------------------------------------------------
# SPI (default ESP32 platform)
spi: !include conf/common/device/spi_esp32-2432s028r_v0.yaml
#-------------------------------------------------------------------
# LVGL configuration
lvgl: !include conf/lvgl/l9lorry01g.yaml
#-------------------------------------------------------------------
# COLOUR configuration
color: !include conf/color/l9lorry01g.yaml
#-------------------------------------------------------------------
# FONT configuration
# needs to be included before display configuration
font: !include conf/font/l9lorry01g.yaml
#-------------------------------------------------------------------
# DISPLAY configuration
display: !include conf/display/l9lorry01g.yaml
#-------------------------------------------------------------------
# TOUCHSCREEN configuration
# config taken from https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/Examples/ESPHome/4-TouchDemo/yellowtft1.yaml
touchscreen: !include conf/touchscreen/l9lorry01g.yaml
#-------------------------------------------------------------------
# Setup a way to control the backlight of the display
light:
  # display backlight control
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON
  # RGB LED to test output
  # - platform: binary
  #   output: gpio4_out
  #   id: local_light
  #   name: "GPIO 4 Light"
  #   on_state:
  #     - lvgl.widget.update:
  #         id: light_switch3
  #         state:
  #           checked: !lambda return id(local_light).current_values.is_on();

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
  - platform: gpio
    pin: GPIO4
    id: gpio4_out
    inverted: true

number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: true
    id: cyd_display_timeout_s
    unit_of_measurement: "s"
    initial_value: 10
    restore_value: true
    min_value: 10
    max_value: 60
    step: 5
    mode: box

####################################################################
###################### DETAILED CONFIGURATION ######################
####################################################################

#-------------------------------------------------------------------
# MISC STUFF NEEDED FOR EXECUTION OF OFFLINE FUNCTIONALITY

globals:
  - <<: !include conf/common/globals/connectivity.yaml
# interval: 
#   - <<: !include conf/common/interval/connectivity.yaml
  # - <<: !include conf/interval/l9lorry01g.yaml
# script:
  # - <<: !include conf/script/l9lorry01g/foobar.yaml

#-------------------------------------------------------------------
# BINARY SENSORS
binary_sensor:
  - <<: !include conf/common/binary_sensor/wifi_status.yaml
  # device related
  # --------------
  # - <<: !include conf/binary_sensor/l9lorry01g/l9lorry01g_coffeemachine.yaml
  # - <<: !include conf/binary_sensor/l9lorry01g/l9lorry01g_dishwasher.yaml
  # - <<: !include conf/binary_sensor/l9lorry01g/l9lorry01g_kettle.yaml
  # - <<: !include conf/binary_sensor/l9lorry01g/l9lorry01g_microwave.yaml
  
#-------------------------------------------------------------------
# SENSORS
sensor:
  # common sensors
  - <<: !include conf/common/sensor/wifisignal.yaml
  - <<: !include conf/common/sensor/uptime.yaml
  # device related
  - <<: !include conf/common/sensor/aht20_01.yaml
  # - <<: !include conf/common/sensor/vl53L0x_01_single.yaml
  # - <<: !include conf/common/sensor/rotary_encoder_01.yaml

#-------------------------------------------------------------------
# SWITCHES
switch:
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
#-------------------------------------------------------------------
# TEXT SENSORS
text_sensor:
  # common text sensors
  - <<: !include conf/common/text_sensor/esphomeversion.yaml
  - <<: !include conf/common/text_sensor/wifiinfo.yaml
  - <<: !include conf/common/text_sensor/uptime.yaml
  # device related
  # none so far

#-------------------------------------------------------------------
# GPS related setup
uart: !include conf/common/device/uart01_esp32_gps.yaml
gps:
  id: ${friendly_id}_gps
  uart_id: ${uart01_esp32_gps_id}
  latitude:
    name: "GPS Latitude"
    id: gps_latitude
  longitude:
    name: "GPS Longitude"
    id: gps_longitude
  altitude:
    name: "GPS Altitude"
    id: gps_altitude
  speed:
    name: "GPS Speed"
    id: gps_speed
  course:
    name: "GPS Course"
    id: gps_course
  satellites:
    name: "GPS Visible Satellites"
    id: gps_satellites
  hdop:
    name: "GPS HDOP"
    id: gps_hdop
  update_interval: ${gps_update_interval}

####################################################################
# EOF

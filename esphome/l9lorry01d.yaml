####################################################################
####################################################################
#
# DEVICE: l9lorry01d (ESP32-2432S028R aka CYD --- with onboard ESP32)
#
####################################################################
####################################################################

####################################################################
# DESCRIPTION
####################################################################
#
# Purpose:
#   - display for the lorry01g device
#
# Future feature:
#   - no idea so far
#
# Hardware:
#   - 1 ESP32-2432S028R aka CYD --- with onboard ESP32, MAC: C0:CD:D6:84:D1:EC
#
# Automation:
#   - still to be determined / documented
#
# WiFi:
#   - connects to the strongest WiFi configured
#
# Input:
#   - via TFT (2.8" TFT SPI display, 320x240)
#   - no physical buttons so far
#
# Output
#   - 2.8" TFT SPI display (320x240)
#   - no physical outputs so far

###################### PACKAGES CONFIGURATION ######################
# naming conventions which override common behaviour

substitutions: 
  <<: !include conf/substitutions/device_specific/l9lorry01d.yaml
  <<: !include conf/substitutions/overwrites/l9lorry01d.yaml

###################### PACKAGES CONFIGURATION ######################
# merge information to setup the base
# log_level can be overwritten in overwrites/<device_name>.yaml

packages:
  substitutions_common: !include conf/common/packages/substitutions/common.yaml
  device_base_common: !include conf/common/packages/device_base_esp32-2432s028r.yaml
  wifi_common: !include conf/common/networking/wifi_multiple_networks_dhcp_ip_esp32-2432s028r_mobile_nowifi.yaml
  # wifi_common: !include conf/common/networking/wifi_multiple_networks_dhcp_ip_esp32-2432s028r_mobile.yaml

############### OTA CONFIGURATION ###############
  # ota: contained an error which got validated nevertheless. 
  # After removal of the error (2x ota: entries) it threw an error, so ota: moved to root level
  # ota: !include conf/common/networking/ota.yaml
ota: !include conf/common/networking/ota.yaml

############### API ###############
api: !include conf/common/networking/api.yaml

############### TIME ###############
time: !include conf/common/time_ntp_cyd.yaml

############### SUN COMPONENT ###############
# as this device is mobile, it does not make sense to include a fixed location.
# However, we might want to use the sun component anyhow, e.g. to have 
# a visual representation of sunrise and sunset times on the display.
sun: !include conf/common/sun.yaml

############### THE FALLBACK HOTSPOT ###############
# it is either webserver or the captive portal, but not both at the same time.
# if both are enabled, the webserver will be used and the captive portal will be ignored.
#-----------
# in case of no connection to the Wifi
# for details see https://esphome.io/components/captive_portal.html
captive_portal:

############### THE WEB SERVER LOCATED ON THIS DEVICE ###############
# it is either webserver or the captive portal, but not both at the same time.
# if both are enabled, the webserver will be used and the captive portal will be ignored.
#-----------
# for details see https://esphome.io/components/web_server/
# web_server:
#   port: 8888
#   # local: Include supporting javascript locally allowing it to work without internet access. 
#   local: true
#   # include_internal: Whether internal entities should be displayed on the web interface
#   include_internal: true

#===================================================================
# Configuration for the 2.8" ESP32-2432S028R aka CYD, a touchscreen display (240x320 RGB)
#
# config based on:
# - if not otherwise stated, the information was taken from
#   https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/Examples/ESPHome/1-Helloworld/yellowtft1.yaml
# - other resources:
#   - I2C: https://github.com/RyanEwen/esphome-lvgl/blob/main/devices/ESP32-2432S028R.yaml
#===================================================================
#-------------------------------------------------------------------
# I2C for the CYD (no longer used, as the CYD has no I2C devices connected to it)
# i2c: !include conf/common/device/i2c_esp32-2432s028r_v1.yaml
#-------------------------------------------------------------------
# SPI (default ESP32 platform)
spi: !include conf/common/device/spi_esp32-2432s028r_v1.yaml
#-------------------------------------------------------------------
# LVGL configuration
lvgl: !include conf/lvgl/l9lorry01d.yaml
#-------------------------------------------------------------------
# COLOUR configuration
color: !include conf/color/l9lorry01d.yaml
#-------------------------------------------------------------------
# FONT configuration
# needs to be included before display configuration
font: !include conf/font/l9lorry01d.yaml
#-------------------------------------------------------------------
# images configuration (e.g. boot screen)
image: !include conf/common/images/esp32-2432s028r_v1.yaml
#-------------------------------------------------------------------
# DISPLAY configuration
display: !include conf/display/l9lorry01d.yaml
#-------------------------------------------------------------------
# TOUCHSCREEN configuration
# config taken from https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/Examples/ESPHome/4-TouchDemo/yellowtft1.yaml
touchscreen: !include conf/touchscreen/l9lorry01d.yaml
#-------------------------------------------------------------------
# ESP32-2432S028R aka CYD - onboard RGB LED (GPIO4, GPIO16, GPIO17)
output: !include conf/common/onboard_leds/esp32_2432s028r_output.yaml
light: !include conf/common/onboard_leds/esp32_2432s028r_light.yaml
#-------------------------------------------------------------------
# screen saver timeout configuration
number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: true
    id: cyd_display_timeout_s
    unit_of_measurement: "s"
    initial_value: 30
    restore_value: true
    min_value: 10
    max_value: 60
    step: 5
    mode: box

####################################################################
###################### DETAILED CONFIGURATION ######################
####################################################################

#-------------------------------------------------------------------
# MISC STUFF NEEDED FOR EXECUTION OF OFFLINE FUNCTIONALITY

globals:
  - <<: !include conf/common/globals/connectivity.yaml
interval: 
  - <<: !include conf/common/interval/connectivity.yaml
  - <<: !include conf/interval/l9lorry01d_time_update.yaml
# script:
  # - <<: !include conf/script/l9lorry01d/foobar.yaml
  

#-------------------------------------------------------------------
# BINARY SENSORS
binary_sensor:
  - <<: !include conf/common/binary_sensor/wifi_status.yaml
  # device related
  # --------------
  - <<: !include conf/binary_sensor/l9lorry01d/l9lorry01d_DayStart.yaml
  - <<: !include conf/binary_sensor/l9lorry01d/l9lorry01d_DayEnd.yaml
  - <<: !include conf/binary_sensor/l9lorry01d/l9lorry01d_POI.yaml
  
#-------------------------------------------------------------------
# SENSORS
sensor:
  # common sensors
  - <<: !include conf/common/sensor/wifisignal.yaml
  - <<: !include conf/common/sensor/uptime.yaml
  # device related
  # the light sensitive resistor R21 on the CYD board connected to GPIO34 (which is an ADC pin) 
  # does not work as expected, so it is currently included in the configuration 'as is' but not used in the automations.
  - <<: !include conf/common/sensor/cyd_brightness_01.yaml
  # # aht20 and bmp280 are currently not included as they are not not reccognized by the 
  # # device, even though they are connected to the I2C bus.
  # - <<: !include conf/common/sensor/aht20_01_lvgl.yaml
  # - <<: !include conf/common/sensor/bmp280_01_lvgl.yaml

#-------------------------------------------------------------------
# SWITCHES
switch:
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      # - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      # - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
#-------------------------------------------------------------------
# TEXT SENSORS
text_sensor:
  # common text sensors
  - <<: !include conf/common/text_sensor/esphomeversion.yaml
  - <<: !include conf/common/text_sensor/wifiinfo.yaml
  - <<: !include conf/common/text_sensor/uptime.yaml
  # device related
  - <<: !include conf/text_sensor/l9lorry01d/l9lorry01d_now_time_and_date.yaml


####################################################################
# EOF
####################################################################

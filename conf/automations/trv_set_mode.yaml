# ############################################################
# Bedroom_L2 preset mode comfort
# ############################################################
- alias: TRV Bedroom_L2 preset mode comfort
  id: "259cb60e-fd6a-4cf3-ba04-0201fffd57f7"
  description: "This automation emulates a schedule for Bedroom_L2 preset mode to comfort"
  mode: single
  initial_state: true
  # --------------------- TRIGGER ---------------------
  # time based execution
  triggers:
    - trigger: time
      at: "19:00:00"
    - trigger: time
      at: "21:00:00"
  # -------------------- CONDITIONS -------------------
  condition:
    - alias: "Allowing the switching of trv preset mode based on enable switch"
      condition: state
      entity_id: input_boolean.trv_enable_preset_mode_switching
      state: "on"
  # --------------------- ACTIONS ---------------------
  action:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.zb_trv_bedroom_l2
      data:
        preset_mode: comfort


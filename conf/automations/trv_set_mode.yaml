# ############################################################
# all TRVs L2 preset mode away because of all people gone
# ############################################################
- alias: TRV all on L2 preset mode away all people gone
  id: "d9d190f6-e04d-4e0c-9747-c93346b82c1f"
  description: "This automation sets preset mode to away in case everbody is gone"
  mode: single
  initial_state: true
  # --------------------- TRIGGER ---------------------
  # state based execution (the last person left)
  triggers:
    - trigger: state
      entity_id: binary_sensor.home_all_are_gone
      to: "on"
  # -------------------- CONDITIONS -------------------
  condition:
    - alias: "Allowing the switching of trv preset mode based on enable switch"
      condition: state
      entity_id: input_boolean.trv_enable_preset_mode_switching
      state: "on"
  # --------------------- ACTIONS ---------------------
  action:
    - action: climate.set_preset_mode
      target:
        entity_id: climate.zb_trv_bedroom_l2
      data:
        preset_mode: away
    - action: climate.set_preset_mode
      target:
        entity_id: climate.zb_trv_kitchen_l2
      data:
        preset_mode: away
    - action: climate.set_preset_mode
      target:
        entity_id: climate.zb_trv_lounge_l2
      data:
        preset_mode: away

